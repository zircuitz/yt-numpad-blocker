<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        width: 220px;
        margin: 0;
        padding: 14px;
        color: #0f0f0f;
      }
      label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        cursor: pointer;
      }
      h1 {
        font-size: 13px;
        margin: 0 0 10px;
      }
      p {
        font-size: 11px;
        color: #606060;
        margin: 10px 0 0;
      }
    </style>
  </head>
  <body>
    <h1>YouTube Numpad Blocker</h1>
    <label>
      <input type="checkbox" id="enabled" />
      Block numpad shortcuts on YouTube
    </label>
    <p>Prevents accidental numpad presses from seeking to a random point in the video.</p>
    <script src="popup.js"></script>
  </body>
</html>
